<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELEMENTA — SKU Generator</title>
<style>
  :root {
    --hide: #241a14;        /* dark tanned leather */
    --hide-2: #2f2119;
    --tag: #ede2cb;         /* parchment / leather tag */
    --tag-line: #d8c8a8;
    --brass: #b0793f;       /* stitching / brass rivet */
    --brass-bright: #d99a5c;
    --ink: #241a14;
    --ink-soft: #6b5a48;
    --ok: #5c7a5c;
    --err: #a24d3d;
    --font-display: 'Fraunces', Georgia, serif;
    --font-mono: 'JetBrains Mono', 'Courier New', monospace;
    --font-body: 'Inter', -apple-system, sans-serif;
  }

  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap');

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background:
      radial-gradient(ellipse at top left, #33251b 0%, var(--hide) 55%),
      var(--hide);
    color: var(--tag);
    font-family: var(--font-body);
    padding: 40px 20px 80px;
  }

  .wrap { max-width: 620px; margin: 0 auto; }

  header { margin-bottom: 32px; text-align: center; }
  header .mark {
    font-family: var(--font-display);
    font-size: 2.1rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: var(--tag);
  }
  header .mark span { color: var(--brass-bright); }
  header .sub {
    font-size: 0.85rem;
    color: #a08d78;
    margin-top: 4px;
    letter-spacing: 0.04em;
  }

  .elements {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 18px 0 0;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #7a6753;
  }
  .elements span:not(:last-child)::after { content: '·'; margin-left: 10px; color: #4a3a2c; }

  .card {
    background: var(--tag);
    color: var(--ink);
    border-radius: 6px;
    padding: 28px 28px 24px;
    box-shadow: 0 20px 50px -20px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(176,121,63,0.25);
    position: relative;
    margin-bottom: 20px;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 14px; left: 14px;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, var(--brass-bright), var(--brass) 70%);
    box-shadow: 4px 4px 0 -4px transparent;
  }
  .card::after {
    content: '';
    position: absolute;
    top: 14px; right: 14px;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, var(--brass-bright), var(--brass) 70%);
  }

  .field { margin-bottom: 18px; }
  .field label {
    display: block;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-soft);
    margin-bottom: 6px;
    font-weight: 600;
  }
  select, input[type=text], input[type=number] {
    width: 100%;
    padding: 11px 12px;
    border: 1.5px solid var(--tag-line);
    border-radius: 4px;
    background: #fbf7ee;
    color: var(--ink);
    font-family: var(--font-body);
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.15s;
  }
  select:focus, input:focus { border-color: var(--brass); }
  select:disabled, input:disabled { opacity: 0.5; cursor: not-allowed; }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  button {
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 0.9rem;
    border: none;
    border-radius: 4px;
    padding: 11px 18px;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.15s;
  }
  button:active { transform: scale(0.98); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-primary { background: var(--ink); color: var(--tag); width: 100%; }
  .btn-primary:hover:not(:disabled) { background: #382a20; }

  .btn-ghost {
    background: transparent;
    color: var(--brass);
    border: 1.5px solid var(--brass);
    padding: 8px 14px;
    font-size: 0.8rem;
  }
  .btn-ghost:hover:not(:disabled) { background: rgba(176,121,63,0.08); }

  .name-row { display: flex; align-items: center; gap: 10px; }
  .name-display {
    flex: 1;
    font-family: var(--font-display);
    font-size: 1.3rem;
    font-weight: 700;
    padding: 10px 12px;
    background: #fbf7ee;
    border: 1.5px solid var(--tag-line);
    border-radius: 4px;
    min-height: 1.4em;
    color: var(--ink);
  }
  .name-display.placeholder { color: #b7a68e; font-weight: 500; font-size: 0.95rem; font-family: var(--font-body); }

  .code-stamp {
    margin-top: 6px;
    background: var(--hide-2);
    border-radius: 6px;
    padding: 20px;
    text-align: center;
  }
  .code-stamp .label {
    font-size: 0.68rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #7a6753;
    margin-bottom: 8px;
  }
  .code-stamp .code {
    font-family: var(--font-mono);
    font-size: 1.7rem;
    font-weight: 700;
    color: var(--brass-bright);
    letter-spacing: 0.04em;
    word-break: break-all;
  }
  .code-stamp .name {
    margin-top: 8px;
    font-family: var(--font-display);
    font-size: 1.05rem;
    color: var(--tag);
  }

  .status {
    font-size: 0.82rem;
    padding: 10px 12px;
    border-radius: 4px;
    margin-bottom: 16px;
  }
  .status.ok { background: rgba(92,122,92,0.12); color: var(--ok); }
  .status.err { background: rgba(162,77,61,0.12); color: var(--err); }

  .hint { font-size: 0.78rem; color: var(--ink-soft); margin-top: 6px; }

  footer {
    text-align: center;
    font-size: 0.72rem;
    color: #6b5a48;
    margin-top: 24px;
    letter-spacing: 0.03em;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="mark">ELEMENTA<span>·</span>SKU</div>
    <div class="sub">Product naming &amp; item code generator</div>
    <div class="elements"><span>Fire</span><span>Water</span><span>Earth</span><span>Air</span><span>Ether</span></div>
  </header>

  <div id="statusBox"></div>

  <div class="card">
    <div class="field">
      <label for="category">Category</label>
      <select id="category"><option value="">Loading…</option></select>
    </div>

    <div class="field" id="modelField" style="display:none;">
      <label>Model Number</label>
      <div class="name-row">
        <div class="name-display placeholder" id="modelDisplay">—</div>
        <button class="btn-ghost" id="refreshModelBtn" type="button">Refresh</button>
      </div>
      <div class="hint">Next unused model number in this category's series.</div>
    </div>

    <div class="row2">
      <div class="field">
        <label for="leather">Leather</label>
        <select id="leather"><option value="">Select category first</option></select>
      </div>
      <div class="field">
        <label for="colour">Colour</label>
        <select id="colour"><option value="">Select category first</option></select>
      </div>
    </div>

    <div class="field" id="sizeField" style="display:none;">
      <label for="size">Size</label>
      <select id="size"><option value="">Select</option></select>
      <div class="hint" id="sizeHint"></div>
    </div>

    <div class="field" id="nameField" style="display:none;">
      <label>Element Name</label>
      <div class="name-row">
        <div class="name-display placeholder" id="nameDisplay">Not generated yet</div>
        <button class="btn-ghost" id="generateBtn" type="button">Generate</button>
      </div>
      <div class="hint">AI-generated, checked against your full naming history for uniqueness.</div>
    </div>

    <div class="field" id="descriptorField" style="display:none;">
      <label for="descriptor">Style Descriptor</label>
      <input type="text" id="descriptor" placeholder="e.g. Fisherman Sandals">
    </div>

    <div class="row2" id="priceFields" style="display:none;">
      <div class="field">
        <label for="mrp">MRP (₹)</label>
        <input type="number" id="mrp" placeholder="3599">
      </div>
      <div class="field">
        <label for="sellingPrice">Selling Price (₹)</label>
        <input type="number" id="sellingPrice" placeholder="1799">
      </div>
    </div>
  </div>

  <div class="card" id="previewCard" style="display:none;">
    <div class="code-stamp">
      <div class="label">Item Code</div>
      <div class="code" id="previewCode">—</div>
      <div class="name" id="previewName">—</div>
    </div>
  </div>

  <button class="btn-primary" id="confirmBtn" disabled>Confirm &amp; Save to Sheet</button>

  <footer>Reads and writes live to your ELEMENTA Google Sheet</footer>
</div>

<script>
// ⚠️ Replace with your deployed Apps Script /exec URL
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxiUi-c_namMHxx50Gon1QgAs0Pxouri3SI-MdUvWXCOvMfoZabFy2CDN1WtFHE3y84/exec';

const state = {
  categories: [], leathers: [], colours: [],
  category: null, hasSize: false, sizeRange: null,
  modelNumber: null, modelNoRow: null,
  leather: null, colour: null, size: null,
  elementName: null
};

const el = id => document.getElementById(id);

function showStatus(msg, type) {
  el('statusBox').innerHTML = `<div class="status ${type}">${msg}</div>`;
}
function clearStatus() { el('statusBox').innerHTML = ''; }

async function apiGet(params) {
  const url = APPS_SCRIPT_URL + '?' + new URLSearchParams(params).toString();
  const res = await fetch(url);
  return res.json();
}
async function apiPost(body) {
  // text/plain avoids a CORS preflight against Apps Script
  const res = await fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(body)
  });
  return res.json();
}

async function init() {
  try {
    const data = await apiGet({ action: 'bootstrap' });
    if (data.error) throw new Error(data.error);
    state.categories = data.categories;
    state.leathers = data.leathers;
    state.colours = data.colours;

    el('category').innerHTML = '<option value="">Choose a category…</option>' +
      state.categories.map(c => `<option value="${c.category}">${c.category}</option>`).join('');
    el('leather').innerHTML = '<option value="">Choose leather…</option>' +
      state.leathers.map(l => `<option value="${l.leather}">${l.leather} (${l.code})</option>`).join('');
    el('colour').innerHTML = '<option value="">Choose colour…</option>' +
      state.colours.map(c => `<option value="${c.colour}">${c.colour} (${c.code})</option>`).join('');
  } catch (err) {
    showStatus('Could not load data from sheet: ' + err.message, 'err');
  }
}

el('category').addEventListener('change', async (e) => {
  clearStatus();
  const catName = e.target.value;
  state.category = state.categories.find(c => c.category === catName) || null;
  el('modelField').style.display = 'none';
  el('sizeField').style.display = 'none';
  el('nameField').style.display = 'none';
  el('descriptorField').style.display = 'none';
  el('priceFields').style.display = 'none';
  updatePreview();

  if (!state.category) return;

  // Model number
  el('modelField').style.display = 'block';
  await loadNextModelNumber();

  // Size
  if (state.category.hasSize) {
    el('sizeField').style.display = 'block';
    await loadSizeRange(catName);
  }

  el('nameField').style.display = 'block';
  el('descriptorField').style.display = 'block';
  el('priceFields').style.display = 'block';
});

async function loadNextModelNumber() {
  el('modelDisplay').textContent = 'Loading…';
  const data = await apiGet({ action: 'getNextModelNumber', category: state.category.category });
  if (data.error) {
    el('modelDisplay').textContent = data.error;
    state.modelNumber = null; state.modelNoRow = null;
  } else {
    el('modelDisplay').textContent = data.modelNumber;
    el('modelDisplay').classList.remove('placeholder');
    state.modelNumber = data.modelNumber;
    state.modelNoRow = data.row;
  }
  updatePreview();
}
el('refreshModelBtn').addEventListener('click', loadNextModelNumber);

async function loadSizeRange(catName) {
  const data = await apiGet({ action: 'getSizeRange', category: catName });
  if (data.error) { el('sizeHint').textContent = data.error; return; }
  const [lo, hi] = data.range.split('-').map(s => s.trim());
  el('sizeHint').textContent = `${data.system} ${data.range}`;
  let opts = '<option value="">Select size…</option>';
  const step = data.system.toLowerCase() === 'inches' ? 2 : 1;
  for (let s = Number(lo); s <= Number(hi); s += step) {
    opts += `<option value="${s}">${s}</option>`;
  }
  el('size').innerHTML = opts;
}

el('leather').addEventListener('change', e => {
  state.leather = state.leathers.find(l => l.leather === e.target.value) || null;
  updatePreview();
});
el('colour').addEventListener('change', e => {
  state.colour = state.colours.find(c => c.colour === e.target.value) || null;
  updatePreview();
});
el('size').addEventListener('change', e => {
  state.size = e.target.value || null;
  updatePreview();
});
el('descriptor').addEventListener('input', updatePreview);

el('generateBtn').addEventListener('click', async () => {
  clearStatus();
  el('generateBtn').disabled = true;
  el('nameDisplay').textContent = 'Generating…';
  try {
    const data = await apiGet({ action: 'generateName' });
    if (data.error) throw new Error(data.error);
    state.elementName = data.name;
    el('nameDisplay').textContent = data.name;
    el('nameDisplay').classList.remove('placeholder');
  } catch (err) {
    el('nameDisplay').textContent = 'Failed — try again';
    showStatus(err.message, 'err');
  }
  el('generateBtn').disabled = false;
  updatePreview();
});

function updatePreview() {
  const ready = state.category && state.modelNumber && state.leather && state.colour &&
    state.elementName && el('descriptor').value.trim() &&
    (!state.category.hasSize || state.size);

  if (!ready) {
    el('previewCard').style.display = 'none';
    el('confirmBtn').disabled = true;
    return;
  }

  const sizePart = state.category.hasSize && state.size ? '-' + state.size : '';
  const code = state.category.code + state.modelNumber + state.leather.code + state.colour.code + sizePart;
  const name = `${state.elementName} ${el('descriptor').value.trim()}-${state.colour.colour}${sizePart}`;

  el('previewCode').textContent = code;
  el('previewName').textContent = name;
  el('previewCard').style.display = 'block';
  el('confirmBtn').disabled = false;
}

el('confirmBtn').addEventListener('click', async () => {
  clearStatus();
  el('confirmBtn').disabled = true;
  el('confirmBtn').textContent = 'Saving…';

  const payload = {
    action: 'confirmAssignment',
    category: state.category.category,
    categoryCode: state.category.code,
    modelNumber: state.modelNumber,
    modelNoRow: state.modelNoRow,
    leather: state.leather.leather,
    leatherCode: state.leather.code,
    colour: state.colour.colour,
    colourCode: state.colour.code,
    size: state.size,
    hasSize: state.category.hasSize,
    elementName: state.elementName,
    descriptor: el('descriptor').value.trim(),
    mrp: el('mrp').value || 0,
    sellingPrice: el('sellingPrice').value || 0
  };

  try {
    const data = await apiPost(payload);
    if (data.error) throw new Error(data.error);
    showStatus(`Saved: ${data.itemCode} — ${data.itemName}`, 'ok');
    setTimeout(() => window.location.reload(), 1800);
  } catch (err) {
    showStatus('Save failed: ' + err.message, 'err');
    el('confirmBtn').disabled = false;
    el('confirmBtn').textContent = 'Confirm & Save to Sheet';
  }
});

init();
</script>
</body>
</html>
